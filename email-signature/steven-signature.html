<table
  width="500"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    color: #1a1a1a;
    max-width: 500px;
  "
>
  <tbody>
    <tr>
      <!-- Green left border -->
      <td width="4" style="background-color: #034c22; border-radius: 2px">&nbsp;</td>
      <td width="16">&nbsp;</td>
      <td>
        <!-- Top row: photo + name/title + SK mark -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tbody>
            <tr>
              <!-- Profile photo -->
              <td width="66" valign="top" style="padding-right: 16px; padding-top: 1px">
                <img
                  src="https://raw.githubusercontent.com/EloyB/sk-accounting-website/main/email-signature/steven.png"
                  alt="Steven Kaers"
                  width="58"
                  height="58"
                  style="
                    display: block;
                    border-radius: 6px;
                    border: 2px solid #d2e7db;
                    object-fit: cover;
                  "
                />
              </td>

              <!-- Name + title -->
              <td valign="middle">
                <table cellpadding="0" cellspacing="0" border="0" width="100%">
                  <tbody>
                    <tr>
                      <td
                        style="
                          font-family: Georgia, 'Times New Roman', serif;
                          font-size: 17px;
                          font-weight: bold;
                          color: #1a1a1a;
                          line-height: 1.2;
                          padding-bottom: 3px;
                        "
                      >
                        Steven Kaers
                      </td>
                      <!-- SK logo pushed to right -->
                      <td align="right" valign="top" rowspan="2" style="padding-left: 12px">
                        <img
                          src="https://raw.githubusercontent.com/EloyB/sk-accounting-website/main/email-signature/logo%202.svg"
                          alt="SK Accounting"
                          width="112"
                          height="71"
                          style="
                            display: block;
                            background-color: #034c22;
                            border-radius: 8px;
                            padding: 8px;
                          "
                        />
                      </td>
                    </tr>
                    <tr>
                      <td
                        style="
                          font-family: Georgia, 'Times New Roman', serif;
                          font-size: 13px;
                          color: #034c22;
                          line-height: 1.2;
                          letter-spacing: 0.3px;
                        "
                      >
                        Certified accountant<br />
                        Bestuurder SK Accounting
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Divider -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tbody>
            <tr>
              <td style="padding-top: 12px; padding-bottom: 12px">
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tbody>
                    <tr>
                      <td
                        height="1"
                        style="background-color: #d6e4db; font-size: 0; line-height: 0"
                      >
                        &nbsp;
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Contact details -->
        <table cellpadding="0" cellspacing="0" border="0">
          <tbody>
            <!-- Phone + Email -->
            <tr>
              <td style="padding-bottom: 5px">
                <table cellpadding="0" cellspacing="0" border="0">
                  <tbody>
                    <tr>
                      <!-- Phone -->
                      <td
                        style="
                          font-family: Georgia, 'Times New Roman', serif;
                          font-size: 13px;
                          color: #444444;
                          white-space: nowrap;
                          padding-right: 20px;
                        "
                      >
                        <span style="color: #034c22">&#9742;</span>&nbsp;
                        <a href="tel:+32 479 60 84 69" style="color: #444444; text-decoration: none"
                          >+32 479 60 84 69</a
                        >
                      </td>
                      <!-- Email -->
                      <td
                        style="
                          font-family: Georgia, 'Times New Roman', serif;
                          font-size: 13px;
                          color: #444444;
                          white-space: nowrap;
                        "
                      >
                        <span style="color: #034c22">&#9993;</span>&nbsp;
                        <a
                          href="mailto:steven@sk-accounting.be"
                          style="color: #034c22; text-decoration: none"
                          >steven@sk-accounting.be</a
                        >
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
            <!-- Website -->
            <tr>
              <td
                style="
                  font-family: Georgia, 'Times New Roman', serif;
                  font-size: 13px;
                  color: #444444;
                  padding-bottom: 5px;
                "
              >
                <span style="color: #034c22">&#127760;</span>&nbsp;
                <a href="https://www.sk-accounting.be" style="color: #444444; text-decoration: none"
                  >sk-accounting.be</a
                >
              </td>
            </tr>
            <!-- Address -->
            <tr>
              <td
                style="
                  font-family: Georgia, 'Times New Roman', serif;
                  font-size: 13px;
                  color: #444444;
                  padding-bottom: 12px;
                "
              >
                <span style="color: #034c22">&#128205;</span>&nbsp;Steenweg op Antwerpen 31/2, 2300
                Turnhout
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
